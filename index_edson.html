<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Edson Neiva – Holograma</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --gold:#004a3c; --gold-glow:rgba(0,74,60,0.6); }
    html, body { width:100%; height:100%; overflow:hidden; background:#e8e0cd; font-family:'Raleway',sans-serif; }

    #camera-bg { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
    #overlay   { position:fixed; inset:0; background:rgba(0,0,0,0.10); z-index:1; }
    #particles { position:fixed; inset:0; pointer-events:none; z-index:2; }
    #bottom-ui {
      position:fixed; bottom:0; left:0; right:0; z-index:3;
      display:flex; flex-direction:column; align-items:center;
      padding-bottom:4vh; pointer-events:none;
    }
    #bottom-ui .btn { pointer-events:all; }

    .corner { position:fixed; width:36px; height:36px; z-index:3; opacity:.5; }
    .corner--tl { top:16px; left:16px;    border-top:2px solid var(--gold); border-left:2px solid var(--gold); }
    .corner--tr { top:16px; right:16px;   border-top:2px solid var(--gold); border-right:2px solid var(--gold); }
    .corner--bl { bottom:16px; left:16px;  border-bottom:2px solid var(--gold); border-left:2px solid var(--gold); }
    .corner--br { bottom:16px; right:16px; border-bottom:2px solid var(--gold); border-right:2px solid var(--gold); }

    #scene {
      position:fixed; inset:0; z-index:2;
      pointer-events:none;
    }

    #hologram-wrap {
      position:absolute;
      width:min(520px, 88vw);
      display:flex; justify-content:center;
      bottom: 8vh;
      left: 50%;
      transform: translateX(-50%);
      cursor: grab;
      touch-action: none;
      pointer-events: all;
      user-select: none;
    }
    #hologram-wrap.dragging { cursor: grabbing; }

    #holo-canvas {
      width:100%; height:auto; display:block;
      filter: drop-shadow(0 0 5px rgba(0,74,60,0.22));
      animation: holoFlicker 8s infinite;
    }

    #holo-video { display:none; }

    @keyframes holoFlicker {
      0%,100%{opacity:1;} 5%{opacity:.93;} 6%{opacity:1;} 51%{opacity:.9;} 52%{opacity:1;}
    }

    #ground-glow {
      width:min(320px,72vw); height:14px; border-radius:50%;
      background:radial-gradient(ellipse at center,rgba(0,74,60,.38) 0%,transparent 70%);
      margin-top:-4px; flex-shrink:0;
      animation:glowPulse 3s ease-in-out infinite;
    }
    @keyframes glowPulse{0%,100%{opacity:.6;transform:scaleX(1);}50%{opacity:1;transform:scaleX(1.08);}}

    #info-card { margin-top:10px; text-align:center; flex-shrink:0; }
    .name {
      font-family:'Cinzel',serif; font-weight:900;
      font-size:clamp(1.3rem,5vw,1.9rem); color:var(--gold);
      letter-spacing:.12em; text-transform:uppercase;
      text-shadow:0 0 8px var(--gold-glow),0 0 20px var(--gold-glow);
    }
    .tagline { margin-top:4px; font-size:clamp(.65rem,2.4vw,.82rem); font-weight:200; letter-spacing:.35em; color:rgba(0,74,60,.6); text-transform:uppercase; }
    .divider { width:min(240px,55vw); height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:10px auto; opacity:.4; }

    #buttons { display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:6px; opacity:0; transform:translateY(20px); transition:opacity .8s ease,transform .8s ease; flex-shrink:0; }
    #buttons.visible { opacity:1; transform:translateY(0); }

    .btn {
      display:flex; align-items:center; justify-content:center; gap:7px;
      padding:10px 20px; border-radius:4px;
      font-family:'Cinzel',serif; font-size:clamp(.6rem,2.3vw,.74rem); font-weight:700;
      letter-spacing:.1em; text-decoration:none; text-transform:uppercase; cursor:pointer;
      border:1.5px solid var(--gold); background:rgba(0,74,60,.08); color:var(--gold);
      box-shadow:0 0 12px rgba(0,74,60,.2); transition:all .25s;
      width: min(280px, 70vw);
    }
    .btn:hover { box-shadow:0 0 22px rgba(0,74,60,.4); background:rgba(0,74,60,.14); }
    .btn:active { transform:scale(.96); }

    /* WhatsApp — destaque máximo */
    .btn-whatsapp {
      color:#fff;
      border:none;
      background:linear-gradient(135deg,#25d366 0%,#1aad54 100%);
      box-shadow:0 0 22px rgba(37,211,102,.55), 0 4px 18px rgba(37,211,102,.4);
      font-size:clamp(.72rem,2.6vw,.88rem);
      padding:13px 24px;
      border-radius:6px;
      animation: waPulse 2.4s ease-in-out infinite;
    }
    .btn-whatsapp:hover {
      box-shadow:0 0 36px rgba(37,211,102,.8), 0 4px 24px rgba(37,211,102,.6);
      background:linear-gradient(135deg,#2edb70 0%,#1fc45e 100%);
    }
    @keyframes waPulse {
      0%,100%{ box-shadow:0 0 22px rgba(37,211,102,.55), 0 4px 18px rgba(37,211,102,.4); }
      50%{     box-shadow:0 0 40px rgba(37,211,102,.85), 0 4px 28px rgba(37,211,102,.65); }
    }

    .btn-site {
      font-size:clamp(.58rem,2.1vw,.7rem);
      opacity:.85;
      width: min(220px, 55vw);
      padding:8px 16px;
    }

    /* Permission screen */
    #permission-screen {
      position:fixed; inset:0; background:#e8e0cd; z-index:100;
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:16px; padding:28px 20px;
      text-align:center; cursor:pointer;
    }
    .ps-logo { font-family:'Cinzel',serif; font-weight:900; font-size:clamp(1.3rem,6vw,1.9rem); color:var(--gold); letter-spacing:.18em; text-shadow:0 0 12px var(--gold-glow); }
    .ps-sub  { font-size:clamp(.6rem,2.4vw,.75rem); color:rgba(0,74,60,.5); letter-spacing:.3em; text-transform:uppercase; }
    #qr-wrapper { position:relative; padding:8px; background:#e8e0cd; border-radius:12px; display:inline-block; }
    #qr-logo-overlay { position:absolute; top:8px; left:8px; pointer-events:none; }
    #qr-wrapper::before {
      content:''; position:absolute; inset:-3px; border-radius:14px;
      background:conic-gradient(from 0deg,transparent 0%,var(--gold) 25%,transparent 50%,var(--gold) 75%,transparent 100%);
      animation:spinBorder 3s linear infinite; z-index:-1;
    }
    @keyframes spinBorder{to{transform:rotate(360deg);}}
    #qr-code img, #qr-code canvas { display:block; border-radius:6px; }
    #qr-scanline {
      position:absolute; left:8px; right:8px; height:3px;
      background:linear-gradient(90deg,transparent,rgba(0,74,60,.9),transparent);
      border-radius:2px; box-shadow:0 0 8px var(--gold-glow);
      animation:scanMove 2.2s ease-in-out infinite; pointer-events:none;
    }
    @keyframes scanMove{0%{top:8px;opacity:0;}8%{opacity:1;}92%{opacity:1;}100%{top:calc(100% - 11px);opacity:0;}}
    .ps-hint { font-size:clamp(.58rem,2.1vw,.7rem); color:rgba(0,74,60,.4); letter-spacing:.14em; text-transform:uppercase; line-height:1.8; }
    .ps-hint strong { color:rgba(0,74,60,.8); }
    #tap-hint {
      font-family:'Cinzel',serif; font-weight:700; font-size:clamp(.68rem,2.6vw,.82rem);
      color:var(--gold); letter-spacing:.22em; text-transform:uppercase;
      animation:pulseTap 2s ease-in-out infinite;
    }
    @keyframes pulseTap{0%,100%{opacity:.45;transform:scale(1);}50%{opacity:1;transform:scale(1.04);}}
    #permission-screen.hidden { opacity:0; pointer-events:none; transition:opacity .7s; }
  </style>
</head>
<body>

<div id="permission-screen">
  <div class="ps-logo">EDSON NEIVA</div>
  <div class="ps-sub">Top New Europa</div>
  <div id="qr-wrapper">
    <div id="qr-code"></div>
    <canvas id="qr-logo-overlay"></canvas>
    <div id="qr-scanline"></div>
  </div>
  <div class="ps-hint"><strong>Partilha este QR Code</strong><br>para abrir o holograma</div>
  <div id="tap-hint">✦ Toque aqui para activar ✦</div>
</div>

<video id="camera-bg" autoplay playsinline muted></video>
<div id="overlay"></div>
<canvas id="particles"></canvas>

<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<div id="scene">
  <div id="hologram-wrap">
    <canvas id="holo-canvas"></canvas>
    <video id="holo-video" playsinline muted preload="auto">
      <source src="hologram_edson.mp4" type="video/mp4"/>
    </video>
  </div>
  <div id="bottom-ui">
    <div id="ground-glow"></div>
    <div id="info-card">
      <div class="name">Edson Neiva</div>
      <div class="tagline">Diretor · Top New Europa</div>
    </div>
    <div class="divider"></div>
    <div id="buttons">

      <!-- WhatsApp — botão principal em destaque -->
      <a class="btn btn-whatsapp" href="https://wa.me/351929248720" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
        </svg>
        Falar no WhatsApp
      </a>

      <!-- Site — botão secundário discreto -->
      <a class="btn btn-site" href="https://topneweuropa.com/" target="_blank" rel="noopener">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        Website
      </a>

    </div>
  </div>
</div>

// Particles
const pC = document.getElementById('particles'), pX = pC.getContext('2d');
let pts = [];
function rP(){ pC.width=innerWidth; pC.height=innerHeight; }
rP(); addEventListener('resize', rP);
(function aP(){
  pX.clearRect(0,0,pC.width,pC.height);
  if(Math.random()<.22) pts.push({x:pC.width*(.2+Math.random()*.6),y:pC.height*.9,vx:(Math.random()-.5)*.5,vy:-(0.4+Math.random()*.9),life:1,decay:.006+Math.random()*.008,r:1+Math.random()*2});
  pts=pts.filter(p=>p.life>0);
  pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;pX.beginPath();pX.arc(p.x,p.y,p.r,0,Math.PI*2);pX.fillStyle=`rgba(0,74,60,${p.life*.7})`;pX.shadowBlur=6;pX.shadowColor=`rgba(0,74,60,${p.life*.5})`;pX.fill();});
  requestAnimationFrame(aP);
})();

// ── Canvas white-background removal ─────────────────────────
const hv  = document.getElementById('holo-video');
const hc  = document.getElementById('holo-canvas');
const hx  = hc.getContext('2d', { willReadFrequently: true });
let   running = false;

function renderLoop() {
  if (!running) return;
  const vw = hv.videoWidth, vh = hv.videoHeight;
  if (vw === 0) { requestAnimationFrame(renderLoop); return; }
  if (hc.width !== vw) { hc.width = vw; hc.height = vh; }
  hx.drawImage(hv, 0, 0, vw, vh);
  const frame = hx.getImageData(0, 0, vw, vh);
  const d     = frame.data;
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2];
    const minCh  = Math.min(r, g, b);
    const spread = Math.max(r, g, b) - minCh;
    if (minCh > 242 && spread < 10) {
      d[i+3] = 0;
    }
  }
  hx.putImageData(frame, 0, 0);
  requestAnimationFrame(renderLoop);
}

// ── Activate on tap ─────────────────────────────────────────
const ps = document.getElementById('permission-screen');
const cb = document.getElementById('camera-bg');
const bt = document.getElementById('buttons');

ps.addEventListener('click', async () => {
  try {
    const s = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' }, audio:false });
    cb.srcObject = s; await cb.play();
  } catch(e){ console.warn('Camera:', e); }

  ps.classList.add('hidden');
  setTimeout(() => ps.style.display='none', 800);

  hv.muted = false;
  try {
    await hv.play();
  } catch(e) {
    hv.muted = true;
    await hv.play();
    setTimeout(() => { hv.muted = false; }, 100);
  }

  running = true;
  renderLoop();

  hv.addEventListener('timeupdate', () => {
    if (hv.duration && (hv.duration - hv.currentTime) <= 3)
      bt.classList.add('visible');
  });
  setTimeout(() => bt.classList.add('visible'), 17000);
});

// ── Drag anywhere on screen ──────────────────────────
(function() {
  var wrap = document.getElementById('hologram-wrap');
  var dragging = false, lastX = 0, lastY = 0;
  var posX = window.innerWidth / 2;
  var posY = window.innerHeight / 2;

  function applyPos() {
    var margin = 20;
    posX = Math.max(margin, Math.min(window.innerWidth  - margin, posX));
    posY = Math.max(margin, Math.min(window.innerHeight - margin, posY));
    wrap.style.left      = posX + 'px';
    wrap.style.top       = posY + 'px';
    wrap.style.bottom    = 'auto';
    wrap.style.transform = 'translate(-50%, -50%)';
  }

  function getXY(e) {
    if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function onStart(e) {
    dragging = true;
    wrap.classList.add('dragging');
    var p = getXY(e);
    lastX = p.x; lastY = p.y;
    e.preventDefault();
    e.stopPropagation();
  }

  function onMove(e) {
    if (!dragging) return;
    var p = getXY(e);
    posX += p.x - lastX;
    posY += p.y - lastY;
    lastX = p.x; lastY = p.y;
    applyPos();
    e.preventDefault();
    e.stopPropagation();
  }

  function onEnd(e) {
    if (!dragging) return;
    dragging = false;
    wrap.classList.remove('dragging');
  }

  wrap.addEventListener('touchstart',  onStart, { passive: false });
  wrap.addEventListener('touchmove',   onMove,  { passive: false });
  wrap.addEventListener('touchend',    onEnd,   { passive: false });
  wrap.addEventListener('touchcancel', onEnd,   { passive: false });
  wrap.addEventListener('mousedown', onStart);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onEnd);

  setTimeout(function() {
    posX = window.innerWidth / 2;
    posY = window.innerHeight / 2;
    applyPos();
  }, 200);

  window.addEventListener('resize', function() {
    posX = window.innerWidth / 2;
    posY = window.innerHeight / 2;
    applyPos();
  });
})();

</script>
